<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mutfakta Panik</title>
    <link rel="icon" type="image/png" href="./css/assets/fare.jpeg">

    
    <style>
        :root {
            --sun-dried-red: #D93B30;
            --garden-pesto: #5B913B;
            --salted-cream: #F4F7F0;
            --olive-branch: #A3AB30;
            --math-rage: #3D0703; 
            --gold-leaf: #D4AF37;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center,var(--sun-dried-red), #1a0301 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 2000;
        }

        .back-nav a {
            color: var(--salted-cream);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 12px 24px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }

        .back-nav a:hover {
            background: var(--gold-leaf);
            color: var(--math-rage);
            border-color: var(--gold-leaf);
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: var(--math-rage);
            border: 2px solid var(--gold-leaf);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 20px;
        }

        .header {
            padding: 25px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(61, 7, 3, 0.9), rgba(61, 7, 3, 0.7));
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            z-index: 100;
        }

        .header h1 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--gold-leaf);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .score-board {
            color: var(--salted-cream);
            font-size: 1.1rem;
            margin-top: 8px;
            opacity: 0.9;
            font-variant-numeric: tabular-nums;
        }

        #game-area {
            flex-grow: 1;
            position: relative;
            background: 
                linear-gradient(to bottom, rgba(61, 7, 3, 0.4), rgba(61, 7, 3, 0.7)), 
                url('./css/assets/background.jpg') center/cover;
            overflow: hidden;
            touch-action: none;
        }

        #game-area::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #player {
            position: absolute;
            width: 60px;
            height: 60px;
            background: url('./css/assets/gameFare.png') no-repeat center/contain;
            z-index: 50;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            will-change: transform;
        }

        .platform {
            position: absolute;
            width: 80px;
            height: 25px;
            background: url('./css/assets/tabak.png') no-repeat center/contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            will-change: transform;
        }

        .item {
            position: absolute;
            width: 28px;
            height: 28px;
            background: no-repeat center/contain;
            z-index: 60;
            pointer-events: none;
            will-change: transform;
        }

        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(26, 3, 1, 0.92);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 40px;
            backdrop-filter: blur(8px);
        }

        #game-over h2 { 
            font-size: 2.8rem; 
            color: var(--sun-dried-red); 
            margin: 0; 
            font-weight: 900;
            line-height: 1;
        }

        #game-over p { color: var(--salted-cream); margin-top: 15px; opacity: 0.8; }

        #game-over button {
            background: var(--garden-pesto);
            color: var(--salted-cream);
            padding: 16px 45px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 0 #3d6128;
            margin-top: 30px;
            transition: all 0.2s;
        }

        #game-over button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #3d6128;
        }

        .ghs-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.5;
            text-transform: uppercase;
            color: var(--salted-cream);
            margin-top: 10px;
        }
        .ghs-value {
            font-size: 1.6rem;
            color: var(--gold-leaf);
            font-weight: 900;
        }

        @media (max-width: 640px) {
            .game-wrapper {
                max-width: 100%;
                max-height: 100dvh;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
        }

        @media (max-width: 480px) {
            .back-nav {
                top: 14px;
                left: 14px;
            }

            .back-nav a {
                font-size: 0.75rem;
                padding: 9px 16px;
                letter-spacing: 0.5px;
            }

            .header {
                padding: 18px 16px;
            }

            .header h1 {
                font-size: 1.1rem;
                letter-spacing: 3px;
            }

            .score-board {
                font-size: 0.95rem;
            }

            #player {
                width: 50px;
                height: 50px;
            }

            .platform {
                width: 65px;
                height: 22px;
            }

            .item {
                width: 24px;
                height: 24px;
            }

            #game-over h2 {
                font-size: 2.2rem;
            }

            #game-over button {
                padding: 14px 36px;
                font-size: 1rem;
            }
        }

        @media (max-width: 360px) {
            .header h1 {
                font-size: 0.95rem;
                letter-spacing: 2px;
            }

            #game-over h2 {
                font-size: 1.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="index.html" style="display:flex;align-items:center;gap:8px;"><span style="font-size:16px;">🏠</span> ANA SAYFA</a>
    </div>

    <div class="game-wrapper">
        <div class="header">
            <h1>Mutfakta Panik</h1>
            <div class="score-board">PUAN <span id="score" style="color: var(--gold-leaf)">0</span></div>
            <div class="high-score" style="color:var(--salted-cream);font-size:0.8rem;margin-top:4px;opacity:0.6;">EN YÜKSEK <span id="highScoreDisplay">0</span></div>
        </div>

        <div id="game-area">
            <div id="player"></div>
            <div id="game-over">
                <h2>EYVAH ŞEF!</h2>
                <p>Tabaklar devrildi, mutfak dağıldı.</p>
                <div style="font-size: 3rem; color: var(--gold-leaf); margin: 20px 0; font-weight: 900;">
                    <span id="final-score">0</span>
                </div>
                <div class="ghs-label">En Yüksek Puan</div>
                <div class="ghs-value" id="gameOverHighScore">0</div>
                <button onclick="resetGame()">TEKRAR DENE</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="./js/game.js"></script>
</body>
</html>
