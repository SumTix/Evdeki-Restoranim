<!DOCTYPE html>

</head>
<body>
    <div class="sidebar" id="sidebar">
        <h2>Evdeki Restoranım</h2>
        <div class="category-group">
            <div class="main-cat" onclick="toggleCat(this)">Gündelik <span>▾</span></div>
            <div class="sub-menu">

                <a class="sub-item" href="/içecekler/gündelik/">İçecek</a>

                <a class="sub-item" href="/tatlılar/sporcu/">Tatlı (Fit)</a>

        </div>

    <!--SAĞ SİDEBAR-->

            <div class="ps-name" id="psName">—</div>
            <div class="ps-email" id="psEmail"></div>
        </div>
        <a href="/game.html" class="ps-card">
            <div class="ps-card-icon">🎮</div>
            <div class="ps-card-label">Mini Oyun</div>
            <div class="ps-card-title">Mutfakta Panik</div>
            <div class="ps-card-sub" id="psHighScore">En Yüksek Puan: —</div>

        <button class="ps-logout" id="psLogoutBtn">⎋ &nbsp;Çıkış Yap</button>
    </div>

        <header class="header">
            <div class="menu-trigger" onclick="toggleSidebar(event)">☰</div>
            <a class="home-btn" href="/" aria-label="Ana Sayfa">🏠</a>
            <div class="search-box">
                <input type="text" id="recipeSearchInput" placeholder="Aklınızdaki lezzetleri arayın...">
            </div>
            <div class="header-right">
                <div id="loginBtnWrapper">
                    <a href="../../girisKayit.html" class="login-btn">Giriş / Kayıt</a>
                </div>
                <div class="profile-icon" id="profileIconBtn" onclick="toggleProfileSidebar(event)"></div>
            </div>
        </header>
        <div class="recipe-grid-section" id="recipeGridSection"></div>

    <script>
        var CATEGORY_CONFIG = {
            kategoriId: 'sporcu-beslenmesi',
            altKategoriAd: 'İçecek',
            baslik: 'Sporcu İçecek'
